name: Build Shared Library (.so) with SCons

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:   # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码（包含子模块）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive   # 如果 godot-cpp 是子模块，必须加这行

      # 2. 缓存 godot-cpp 依赖
      - name: Cache godot-cpp
        uses: actions/cache@v4
        with:
          path: godot-cpp
          key: ${{ runner.os }}-godot-cpp-${{ hashFiles('godot-cpp/**') }}

      # 3. 安装 SCons
      - name: Install SCons
        run: pip install scons

      # 4. 编译 .so
      - name: Build .so for Android arm64
        run: scons platform=android

      # 5. 上传构建产物
      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libopentower_debug_arm64.so
          path: bin/*.so
          if-no-files-found: error