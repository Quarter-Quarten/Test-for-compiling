name: Build Shared Library (.so) with SCons

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive



      # ----- NDK配置 -----
      # 尝试从缓存恢复 NDK
      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/28.1.13356709
          key: ndk-28.1.13356709-v1   # v1 可手动递增以强制刷新缓存
      # 缓存未命中时用 sdkmanager 安装
      - name: Install required Android NDK (if not cached)
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "ndk;28.1.13356709"
      # 配置 NDK_ROOT
      - name: Set ANDROID_NDK_ROOT
        run: echo "ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/28.1.13356709" >> $GITHUB_ENV



      # ----- Scons配置 -----
      # 安装 Scons
      - name: Install SCons
        run: pip install scons
      # 设置 SCons 缓存目录（分文件缓存）
      - name: Setup SCons cache
        run: |
          mkdir -p scons_cache
          echo "SCONS_CACHE=scons_cache" >> $GITHUB_ENV
      # 缓存 SCons 编译中间文件（.o 等）
      - name: Cache SCons build files
        uses: actions/cache@v4
        with:
          path: scons_cache
          key: ${{ runner.os }}-scons-cache1-${{ hashFiles('src/**', 'godot-cpp/**') }}
          restore-keys: |
            ${{ runner.os }}-scons-cache1-
      # 删除源文件已不存在的 .o 文件
      - name: Remove orphan object files
        run: |
          set -e
          # 源文件在 src/ 和 godot-cpp/ 目录下
          # .o 文件在 scons_cache 中通常保持相似的相对路径结构，例如：
          #   src/main.cpp -> scons_cache/src/main.o
          # 你需要根据实际构建配置调整下面的路径映射
          
          find scons_cache -name "*.o" | while read obj; do
            # 从 .o 路径推断源文件路径（去掉 scons_cache/ 前缀，把 .o 改为 .cpp 或 .c）
            src="${obj#scons_cache/}"          # 去掉 scons_cache/ 前缀
            src="${src%.o}.cpp"                # 假设源文件是 .cpp，如果是 .c 则改为 .c
            
            # 检查源文件是否存在（在仓库根目录下）
            if [ ! -f "$src" ] && [ ! -f "${src%.cpp}.c" ]; then
              echo "Source deleted: $src -> removing $obj"
              rm -f "$obj"
            fi
          done
        shell: bash
      
      

      # 编译
      - name: Build .so for Android arm64
        run: scons platform=android arch=arm64 target=template_debug

      # 上传
      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libopentower-android-arm64
          path: bin/*.android.*.so
          if-no-files-found: error